<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城實景導覽地圖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #f0f2f5;
    }
    #map {
      flex: 2;
      height: 100%;
    }
    #sidebar {
      flex: 1;
      max-width: 400px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #d1d5db;
      box-sizing: border-box;
      background: #ffffff;
    }
    .place {
      margin-bottom: 24px;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      border: 1px solid #eee;
    }
    .place:hover {
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      transform: translateY(-4px);
    }
    .place img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .place-content {
      padding: 16px;
    }
    .place h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #1a202c;
    }
    .place p {
      margin: 0;
      font-size: 14px;
      color: #4a5568;
      line-height: 1.6;
    }
    .place small {
      display: inline-block;
      margin-top: 12px;
      color: #3182ce;
      font-weight: 600;
    }
    h2 { color: #2d3748; margin-top: 0; border-bottom: 2px solid #3182ce; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島景點實景導覽</h2>
    <p style="color:#718096; font-size:14px; margin-bottom:20px;">點擊下方卡片，帶你穿梭老城與海岸線。</p>
    <div id="place-list"></div>
  </div>

  <script>
    // 替換為穩定的實景圖源
    const places = [
      {
        id: "indigo",
        title: "青島英迪格酒店 Hotel Indigo",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=800&q=80",
        description: "融合德式復古與現代潮流的設計酒店，窗外即是老城紅瓦綠樹的絕美景緻。"
      },
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        imageUrl: "https://images.unsplash.com/photo-1549413647-797745778a68?auto=format&fit=crop&w=800&q=80",
        description: "青島百年的標誌，伸向大海的長廊，記錄著這座城市的開端與浪漫。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://images.unsplash.com/photo-1516491609584-c81831885b51?auto=format&fit=crop&w=800&q=80",
        description: "宏偉的雙塔尖頂建築，在老城的坡道間若隱若現，是攝影愛好者的天堂。"
      },
      {
        id: "zhongshan-road",
        title: "中山路老街",
        lat: 36.0700,
        lng: 120.3235,
        imageUrl: "https://images.unsplash.com/photo-1449156001533-cb39c7324c61?auto=format&fit=crop&w=800&q=80",
        description: "曾經的商業核心，兩側老房子訴說著歷史，適合漫無目的地探索。"
      },
      {
        id: "ship-dumpling",
        title: "船歌魚水餃",
        lat: 36.0690,
        lng: 120.3245,
        imageUrl: "https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&w=800&q=80",
        description: "以黑色墨魚皮包裹的鮮美海魚餡，每一口都是道地的青島海味。"
      },
      {
        id: "liu-seafood",
        title: "劉氏海鮮燒烤",
        lat: 36.0730,
        lng: 120.3260,
        imageUrl: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=800&q=80",
        description: "大口吃肉、大口喝酒，在炭火香氣中感受北方城市的熱情。"
      },
      {
        id: "beer-house",
        title: "青島啤酒館",
        lat: 36.0745,
        lng: 120.3250,
        imageUrl: "https://images.unsplash.com/photo-1571613316887-6f8d5cbf7ef7?auto=format&fit=crop&w=800&q=80",
        description: "用塑膠袋裝啤酒是這裡的特色，喝的是這座城市的靈魂與記憶。"
      },
      {
        id: "small-beer-hut",
        title: "小木屋啤酒屋",
        lat: 36.0605,
        lng: 120.3190,
        imageUrl: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=800&q=80",
        description: "海邊的微醺時光，聽著浪潮聲，享受一杯最新鮮的原漿啤酒。"
      },
      {
        id: "cafe-1907",
        title: "1907 咖啡館",
        lat: 36.0645,
        lng: 120.3220,
        imageUrl: "https://images.unsplash.com/photo-1442512595331-e89e73853f31?auto=format&fit=crop&w=800&q=80",
        description: "在德國水兵俱樂部舊址內，品味時光交織下的歐式優雅。"
      },
      {
        id: "german-bakery",
        title: "德國麵包房",
        lat: 36.0680,
        lng: 120.3215,
        imageUrl: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=800&q=80",
        description: "純正的鹼水麵包與黑麥香氣，喚醒老城清晨的第一抹嗅覺記憶。"
      }
    ];

    let map;
    let infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15,
        disableDefaultUI: false,
        styles: [
          { "featureType": "poi.park", "stylers": [{ "color": "#e5e7eb" }] }
        ]
      });

      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title,
          animation: google.maps.Animation.DROP
        });

        marker.addListener("click", () => {
          openInfoWindow(place, marker);
        });

        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      const content = `
        <div style="max-width:260px; font-family: sans-serif;">
          <h3 style="margin:0 0 10px; font-size:18px; color:#2d3748;">${place.title}</h3>
          <img src="${place.imageUrl}" style="width:100%; height:150px; object-fit:cover; border-radius:8px; margin-bottom:10px;" />
          <p style="margin:0; font-size:14px; color:#4a5568; line-height:1.5;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <img src="${place.imageUrl}">
          <div class="place-content">
            <h3>${place.title}</h3>
            <p>${place.description}</p>
            <small>📍 在地圖中顯示</small>
          </div>
        `;
        item.addEventListener("click", () => {
          openInfoWindow(place, place._marker);
          if (window.innerWidth < 768) {
            window.scrollTo(0, 0);
          }
        });
        listEl.appendChild(item);
      });
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqqo4xar0xJ3Z5GC-TLd4MRnsGYszCL1k&callback=initMap">
  </script>
</body>
</html>
