<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白六快傳地圖 - 日期分色版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; }
        body { font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; }

        /* 視窗樣式優化 */
        #detail-modal { border: none; border-radius: 25px; padding: 0; width: 92%; max-width: 500px; height: 85vh; outline: none; }
        .modal-header { background: var(--primary-color); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { height: calc(85vh - 60px); overflow-y: auto; background: white; }

        /* 日期標籤樣式 */
        .date-badge { 
            display: inline-block; padding: 4px 12px; border-radius: 12px; 
            font-size: 12px; font-weight: bold; margin-bottom: 10px; color: white;
        }
        
        .info-section { padding: 15px; }
        .estimation-bar { padding: 12px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 12px; margin-bottom: 15px; font-size: 13px; }
        .note-box { font-size: 15px; line-height: 1.6; padding: 12px; background: #f8faf8; border-radius: 12px; border-left: 5px solid var(--primary-color); }
        
        .web-container { flex: 1; min-height: 400px; border-top: 1px solid #eee; }
        .web-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="map"></div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold;">景點資訊</span>
        <button style="background:none; border:none; color:white; font-size:32px; cursor:pointer;" onclick="this.closest('dialog').close()">×</button>
    </div>
    <div class="modal-body">
        <div class="info-section">
            <div id="modal-date-tag" class="date-badge"></div>
            <div id="est-bar" class="estimation-bar"></div>
            <div id="modal-note" class="note-box"></div>
        </div>
        <div class="web-container">
            <iframe id="info-frame" class="web-frame" src=""></iframe>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([38.5, 140.8], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 顏色對應表
    const dateColors = {
        "05/31": "blue",
        "06/01": "red",
        "06/02": "orange",
        "06/03": "violet",
        "06/04": "green",
        "06/05": "gold",
        "06/06": "black"
    };

    let allPoints = [
        { "date": "06/02", "lat": 38.9442, "lng": 141.0505, "title": "嚴美溪", "note": "Day 3: 觀察「郭公糰子」的滑索物理傳遞機制。", "wikiUrl": "https://zh.m.wikipedia.org/wiki/嚴美溪", "trans": {"m":"🚗","d":"85km","t":"1h10m"} }
    ];

    function createIcon(color, isBig) {
        const size = isBig ? [46, 75] : [28, 45];
        return L.divIcon({
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${size[0]}px;height:${size[1]}px;">`,
            iconSize: size, iconAnchor: [size[0]/2, size[1]]
        });
    }

    function openDetail(index) {
        const p = allPoints[index];
        const color = dateColors[p.date] || "blue";

        // 設定日期標籤顏色
        const dateTag = document.getElementById('modal-date-tag');
        dateTag.innerText = "📅 日期：" + p.date;
        dateTag.style.backgroundColor = color === 'gold' ? '#d4a017' : color;

        // 交通估算
        document.getElementById('est-bar').innerText = p.trans ? 
            `${p.trans.m} 下一站：約 ${p.trans.d} / ${p.trans.t}` : "🚩 行程終點";

        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-note').innerText = p.note;
        document.getElementById('info-frame').src = `https://www.google.com/search?q=${encodeURIComponent(p.title)}&igu=1`;

        document.getElementById('detail-modal').showModal();
        map.panTo([p.lat, p.lng]);
    }

    // 初始化針頭並自動分色
    allPoints.forEach((p, i) => {
        const color = dateColors[p.date] || "blue";
        L.marker([p.lat, p.lng], { icon: createIcon(color, false) })
         .addTo(map)
         .on('click', () => openDetail(i));
    });
</script>
</body>
</html>
