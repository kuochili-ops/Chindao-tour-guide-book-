<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳地圖 - AI 搜尋整合版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --accent-blue: #007aff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f2; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* 底部按鈕 */
        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; background: rgba(255,255,255,0.9);
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 景點主視窗 (中型尺寸) */
        #detail-modal {
            border: none; border-radius: 20px; padding: 0; width: 92%; max-width: 500px;
            height: 85vh; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            outline: none; overflow: hidden;
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        
        .modal-header { 
            background: var(--primary-color); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { 
            height: calc(85vh - 65px); overflow-y: auto; display: flex; flex-direction: column;
            background: #fff;
        }

        /* 導航區 */
        .info-header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .nav-links { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .nav-btn { 
            flex: 1; padding: 10px; border: 1px solid #eee; border-radius: 12px; 
            background: #fff; cursor: pointer; text-align: center; font-size: 13px;
        }
        .nav-btn:disabled { opacity: 0.3; }
        .note-box { 
            font-size: 14px; color: #444; line-height: 1.5; padding: 12px; 
            background: #f8faf8; border-radius: 10px; border-left: 4px solid var(--primary-color);
        }

        /* 搜尋結果區塊 */
        .web-container { flex: 1; min-height: 400px; background: #fff; }
        .web-frame { width: 100%; height: 100%; border: none; }

        .custom-pin img { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer;" onclick="exportData()">📤 匯出</button>
    <button style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--accent-blue); color: white; font-weight: bold; cursor: pointer;" onclick="document.getElementById('fileInput').click()">📥 匯入</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold;">景點導覽</span>
        <button style="background:none; border:none; color:white; font-size:32px; cursor:pointer;" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
        <div class="info-header">
            <div class="nav-links">
                <button id="prev-btn" class="nav-btn">← <span id="prev-title">上一站</span></button>
                <button id="next-btn" class="nav-btn"><span id="next-title">下一站</span> →</button>
            </div>
            <div id="modal-note" class="note-box"></div>
        </div>

        <div class="web-container">
            <iframe id="info-frame" class="web-frame" src="about:blank"></iframe>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([38.9442, 141.0505], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allPoints = [
        { 
            "date": "Day 3", 
            "lat": 38.9442, 
            "lng": 141.0505, 
            "title": "嚴美溪", 
            "note": "Day 3: 觀察「郭公糰子」的滑索物理傳遞機制。"
        }
    ];

    let markerList = [];
    let currentActiveMarker = null;

    function getPinColor(date) {
        const colors = ['blue', 'red', 'orange', 'violet', 'green', 'gold', 'grey', 'black'];
        return colors[0]; // 預設藍色
    }

    function createIcon(color, isBig) {
        const size = isBig ? [45, 73] : [28, 44];
        return L.divIcon({
            className: 'custom-pin',
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${size[0]}px;height:${size[1]}px;">`,
            iconSize: size, iconAnchor: [size[0]/2, size[1]]
        });
    }

    function openDetail(index) {
        const p = allPoints[index];
        if (!p) return;

        // 地圖平移
        map.panTo([p.lat, p.lng], { animate: true });
        setTimeout(() => map.panBy([0, -180], { animate: true }), 250);

        // 針頭縮放
        if (currentActiveMarker) {
            const oldIdx = markerList.indexOf(currentActiveMarker);
            currentActiveMarker.setIcon(createIcon(getPinColor(allPoints[oldIdx]?.date), false));
        }
        const targetMarker = markerList[index];
        targetMarker.setIcon(createIcon(getPinColor(p.date), true));
        currentActiveMarker = targetMarker;

        // UI 填充
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-note').innerHTML = p.note.replace(/\n/g, '<br>');

        // Google 搜尋 AI 化 (整合景點名與搜尋參數)
        const searchQuery = encodeURIComponent(p.title + " 景點 介紹");
        // 使用 Google 搜尋連結
        document.getElementById('info-frame').src = `https://www.google.com/search?q=${searchQuery}&igu=1`;

        // 導航邏輯
        const pb = document.getElementById('prev-btn'), nb = document.getElementById('next-btn');
        if (allPoints.length > 1) {
            pb.disabled = index === 0;
            if (index > 0) {
                document.getElementById('prev-title').innerText = allPoints[index-1].title;
                pb.onclick = () => openDetail(index - 1);
            }
            nb.disabled = index === allPoints.length - 1;
            if (index < allPoints.length - 1) {
                document.getElementById('next-title').innerText = allPoints[index+1].title;
                nb.onclick = () => openDetail(index + 1);
            }
        } else {
            pb.disabled = nb.disabled = true;
            document.getElementById('prev-title').innerText = "起點";
            document.getElementById('next-title').innerText = "終點";
        }

        document.getElementById('detail-modal').showModal();
    }

    function closeModal() {
        document.getElementById('detail-modal').close();
    }

    function renderMarkers() {
        markerList.forEach(m => map.removeLayer(m));
        markerList = [];
        allPoints.forEach((p, index) => {
            const marker = L.marker([p.lat, p.lng], { icon: createIcon(getPinColor(p.date), false) });
            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                openDetail(index);
            });
            marker.addTo(map);
            markerList.push(marker);
        });
    }

    // 匯入與匯出 (維持原邏輯)
    function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            allPoints = JSON.parse(e.target.result);
            renderMarkers();
        };
        reader.readAsText(file);
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(allPoints, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Route_Export.json`;
        a.click();
    }

    renderMarkers();
</script>
</body>
</html>
