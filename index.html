<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城＆海邊景點地圖導覽</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      color: #333;
    }
    #map {
      flex: 2;
      height: 100%;
    }
    #sidebar {
      flex: 1;
      max-width: 420px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      box-sizing: border-box;
      background: #f9f9f9;
    }
    .place {
      background: #fff;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .place:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    .place h3 {
      margin: 0 0 6px;
      font-size: 16px;
      color: #007bff;
    }
    .place p {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.4;
      color: #555;
    }
    .place img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
      display: block;
    }
    .place small {
      color: #999;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島老城導覽</h2>
    <p>點選下方景點或地圖標記查看詳情。</p>
    <div id="place-list"></div>
  </div>

  <script>
    const places = [
      {
        id: "indigo",
        title: "青島英迪格酒店 Hotel Indigo",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/4/4e/Qingdao_Historic_Building.jpg",
        description: "位於青島老城區核心的設計酒店，是探索老城與海邊的完美基地。"
      },
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/4/4c/Zhanqiao_Pier_in_Qingdao_2018.jpg",
        description: "青島最具代表性的地標之一，也是青島啤酒標誌上的原型。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/8/8e/St._Michael%27s_Cathedral_in_Qingdao_2018.jpg",
        description: "德式風格教堂建築，是青島老城區最具代表性的歷史建物之一。"
      },
      {
        id: "zhongshan-road",
        title: "中山路老街",
        lat: 36.0700,
        lng: 120.3235,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/3/3e/Zhongshan_Road_Qingdao_2018.jpg",
        description: "青島老城區的傳統商業街，保留許多老建築與在地小吃。"
      },
      {
        id: "ship-dumpling",
        title: "船歌魚水餃",
        lat: 36.0690,
        lng: 120.3245,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Qingdao_Zhongshan_Road_Street_View.jpg",
        description: "以海鮮水餃聞名的餐廳，招牌海膽與蝦仁水餃口感鮮甜。"
      },
      {
        id: "liu-seafood",
        title: "劉氏海鮮燒烤",
        lat: 36.0730,
        lng: 120.3260,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/6/6e/Qingdao_Seafood_Night_Market.jpg",
        description: "在地人也常光顧的海鮮燒烤店，搭配青島啤酒非常過癮。"
      },
      {
        id: "beer-house",
        title: "青島啤酒館",
        lat: 36.0745,
        lng: 120.3250,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/4/4d/Tsingtao_Beer_Museum_2018.jpg",
        description: "提供多款青島啤酒與下酒菜，氣氛輕鬆。"
      },
      {
        id: "small-beer-hut",
        title: "小木屋啤酒屋",
        lat: 36.0605,
        lng: 120.3190,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/1/1a/Qingdao_Seaside_Bar.jpg",
        description: "位於棧橋附近，適合看海景後來一杯啤酒。"
      },
      {
        id: "cafe-1907",
        title: "1907 咖啡館",
        lat: 36.0645,
        lng: 120.3220,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/5/5e/Qingdao_Historic_Building_Cafe.jpg",
        description: "由老建築改造的文青咖啡館，保留歷史氛圍。"
      },
      {
        id: "german-bakery",
        title: "德國麵包房",
        lat: 36.0680,
        lng: 120.3215,
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/9/9f/German_Bakery_Bread.jpg",
        description: "提供正宗德式麵包，是很受歡迎的早餐選擇。"
      }
    ];

    let map;
    let infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15,
        styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
      });

      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title,
          animation: google.maps.Animation.DROP
        });

        marker.addListener("click", () => {
          openInfoWindow(place, marker);
        });

        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      // 關鍵修復：加入 referrerpolicy="no-referrer"
      const content = `
        <div style="max-width:240px; font-family: sans-serif;">
          <h3 style="margin:0 0 8px; font-size:16px;">${place.title}</h3>
          <img src="${place.imageUrl}" 
               referrerpolicy="no-referrer" 
               onerror="this.src='https://via.placeholder.com/240x150?text=Image+Not+Found'"
               style="width:100%; height:150px; object-fit:cover; border-radius:4px; margin-bottom:8px;" />
          <p style="margin:0; font-size:13px; color:#666; line-height:1.5;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <img src="${place.imageUrl}" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src='https://via.placeholder.com/150x100?text=No+Image';">
          <h3>${place.title}</h3>
          <p>${place.description}</p>
          <small>📍 點擊在地圖上查看</small>
        `;
        item.addEventListener("click", () => {
          openInfoWindow(place, place._marker);
          map.setZoom(17);
        });
        listEl.appendChild(item);
      });
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqqo4xar0xJ3Z5GC-TLd4MRnsGYszCL1k&callback=initMap">
  </script>
</body>
</html>
