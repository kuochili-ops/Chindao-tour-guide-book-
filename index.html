<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城實景導覽地圖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background-color: #f4f7f6;
    }
    #map { flex: 2; height: 100%; }
    #sidebar {
      flex: 1;
      max-width: 420px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      background: #fff;
    }
    .place {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .place:hover { background-color: #f9f9f9; }
    .place h3 { margin: 0 0 6px; font-size: 17px; color: #0056b3; }
    .place p { margin: 0; font-size: 13.5px; color: #555; line-height: 1.6; }
    .place small { color: #999; display: block; margin-top: 5px; }
    h2 { color: #333; margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島景點實景導覽</h2>
    <p style="font-size: 14px; color: #888; margin-bottom: 20px;">點選標記即可查看您提供的實景照片與說明。</p>
    <div id="place-list"></div>
  </div>

  <script>
    const places = [
      {
        id: "indigo",
        title: "青島英迪格酒店 Hotel Indigo",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600",
        description: "位於老城核心的優質住宿，是探索紅瓦綠樹建築群與海岸線的最佳起點。"
      },
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        imageUrl: "https://tse4.mm.bing.net/th/id/OIP.djmABa5uF4YmtevUnML2BQHaFY?pid=ImgDetMain",
        description: "青島最具代表性的地標，漫步在延伸入海的長廊，感受「長虹遠引」的海港魅力。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://www.settour.com.tw/ss_img/poi/20200819/6ddf0848-3266-49c0-a80d-1075f489d3d4.jpg",
        description: "聖彌額爾大教堂，雙塔尖頂的德式美學，是老城區天際線中最浪漫的點綴。"
      },
      {
        id: "zhongshan-road",
        title: "中山路老街",
        lat: 36.0700,
        lng: 120.3235,
        imageUrl: "https://www.news.cn/ci/20240821/69d02dd48a3c4ad590362e645da37368/2024082169d02dd48a3c4ad590362e645da37368_20240819806e536a813d4601b5d09a3259e08258.jpeg",
        description: "充滿近代歷史底蘊的商業老街，兩側建築見證了城市的變遷與繁榮。"
      },
      {
        id: "ship-dumpling",
        title: "船歌魚水餃",
        lat: 36.0690,
        lng: 120.3245,
        imageUrl: "https://icrvb3jy.xinmedia.com/solomo/article/E/5/D/E5D25FD2-42B0-9684-16F1-F90783611D50.jpeg",
        description: "青島特色美食，鮮美的海鮮內餡搭配Ｑ彈皮質，墨魚水餃更是每桌必點。"
      },
      {
        id: "liu-seafood",
        title: "劉氏海鮮燒烤",
        lat: 36.0730,
        lng: 120.3260,
        imageUrl: "https://followmii.tw/wp-content/uploads/2024/09batch_PXL_20240919_103113614-1.jpg",
        description: "感受道地的青島煙火氣，現烤鮮活海產配上冰鎮啤酒，是夏夜的最佳享受。"
      },
      {
        id: "beer-house",
        title: "青島啤酒館",
        lat: 36.0745,
        lng: 120.3250,
        imageUrl: "https://qp-bowuguan-web.oss-cn-qingdao.aliyuncs.com/2025/3/28/1905511455555047425.png",
        description: "走入啤酒的故鄉，品嚐剛出廠的新鮮生啤，體驗青島獨有的啤酒文化。"
      },
      {
        id: "small-beer-hut",
        title: "小木屋啤酒屋",
        lat: 36.0605,
        lng: 120.3190,
        imageUrl: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=600",
        description: "棧橋附近的小憩之處，在海風輕拂下乾杯，享受片刻的自在時光。"
      },
      {
        id: "cafe-1907",
        title: "1907 咖啡館",
        lat: 36.0645,
        lng: 120.3220,
        imageUrl: "https://ak-d.tripcdn.com/images/1mi0d224x98oyzgfvC519.jpg",
        description: "身處百年建築「水兵俱樂部」中，在優雅的古典氛圍裡細品咖啡與歷史。"
      },
      {
        id: "german-bakery",
        title: "德國麵包房 German Bakery",
        lat: 36.0680,
        lng: 120.3215,
        imageUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdgiT-sBtkDS8sSWe89xBbzRN5kTTljwHLC0HvzXryFMRGY_mKwq2O7NY&s=10",
        description: "傳承德式烘焙工藝，紮實的口感與麥香，讓人回味老城區的異國餘韻。"
      }
    ];

    let map, infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15
      });
      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title
        });
        marker.addListener("click", () => openInfoWindow(place, marker));
        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      const content = `
        <div style="max-width:240px; padding:5px;">
          <h3 style="margin:0 0 8px; font-size:16px;">${place.title}</h3>
          <img src="${place.imageUrl}" referrerpolicy="no-referrer" style="width:100%; height:140px; object-fit:cover; border-radius:6px; margin-bottom:8px;" />
          <p style="margin:0; font-size:13px; color:#555; line-height:1.4;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <h3>${place.title}</h3>
          <p>${place.description}</p>
          <small>📍 點擊在地圖查看</small>
        `;
        item.addEventListener("click", () => openInfoWindow(place, place._marker));
        listEl.appendChild(item);
      });
    }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqqo4xar0xJ3Z5GC-TLd4MRnsGYszCL1k&callback=initMap"></script>
</body>
</html>
