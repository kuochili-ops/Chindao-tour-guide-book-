<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城＆海邊景點地圖導覽</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #f8f9fa;
    }
    #map {
      flex: 2;
      height: 100%;
    }
    #sidebar {
      flex: 1;
      max-width: 420px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      box-sizing: border-box;
      background: white;
    }
    .place {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    .place:hover {
      background-color: #fdfdfd;
    }
    .place h3 {
      margin: 0 0 6px;
      font-size: 17px;
      color: #0056b3;
    }
    .place p {
      margin: 0;
      font-size: 13.5px;
      color: #555;
      line-height: 1.5;
    }
    .place small {
      color: #999;
      display: block;
      margin-top: 5px;
    }
    h2 { color: #333; margin-top: 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島老城導覽</h2>
    <p style="font-size: 14px; color: #888;">點選標記查看實景照片與背景說明。</p>
    <div id="place-list"></div>
  </div>

  <script>
    const places = [
      {
        id: "indigo",
        title: "青島英迪格酒店 Hotel Indigo",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600",
        description: "融合老城德式風情與摩登設計，步行即可抵達各大核心景點，是深度旅遊的最佳住所。"
      },
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        imageUrl: "https://tse4.mm.bing.net/th/id/OIP.djmABa5uF4YmtevUnML2BQHaFY?pid=ImgDetMain",
        description: "青島標誌性建築。延伸入海的長廊盡頭是八角亭回瀾閣，看海聽濤的最佳視角。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://www.settour.com.tw/ss_img/poi/20200819/6ddf0848-3266-49c0-a80d-1075f489d3d4.jpg",
        description: "宏偉的德式哥德式建築，這座雙塔教堂是老城區的天際線核心，也是攝影熱點。"
      },
      {
        id: "zhongshan-road",
        title: "中山路老街",
        lat: 36.0700,
        lng: 120.3235,
        imageUrl: "https://images.unsplash.com/photo-1548625361-12503254203a?auto=format&fit=crop&w=600",
        description: "百年老字號雲集的商業街，漫步其中能感受到近代青島的繁榮與歐陸氛圍。"
      },
      {
        id: "ship-dumpling",
        title: "船歌魚水餃（中山路）",
        lat: 36.0690,
        lng: 120.3245,
        imageUrl: "https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&w=600",
        description: "青島必吃美食！以新鮮海魚入餡，黑色墨魚餃與黃花魚餃是其招牌特色。"
      },
      {
        id: "liu-seafood",
        title: "劉氏海鮮燒烤",
        lat: 36.0730,
        lng: 120.3260,
        imageUrl: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=600",
        description: "老城區的高人氣燒烤店，各類鮮活海產現烤現吃，配上原漿啤酒非常道地。"
      },
      {
        id: "beer-house",
        title: "青島啤酒館",
        lat: 36.0745,
        lng: 120.3250,
        imageUrl: "https://images.unsplash.com/photo-1571613316887-6f8d5cbf7ef7?auto=format&fit=crop&w=600",
        description: "除了啤酒博物館，這類啤酒館提供多樣化的啤酒體驗，是享受微醺時光的好地方。"
      },
      {
        id: "small-beer-hut",
        title: "小木屋啤酒屋",
        lat: 36.0605,
        lng: 120.3190,
        imageUrl: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=600",
        description: "位於海岸線旁，風格簡潔溫馨。在吹拂的海風中喝上一杯最新鮮的啤酒，格外暢快。"
      },
      {
        id: "cafe-1907",
        title: "1907 咖啡館",
        lat: 36.0645,
        lng: 120.3220,
        imageUrl: "https://images.unsplash.com/photo-1442512595331-e89e73853f31?auto=format&fit=crop&w=600",
        description: "坐落於百年古蹟「水兵俱樂部」舊址，在充滿光影歷史的空間品嚐精緻手沖。"
      },
      {
        id: "german-bakery",
        title: "德國麵包房 German Bakery",
        lat: 36.0680,
        lng: 120.3215,
        imageUrl: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=600",
        description: "純正的德式烘焙，其黑麥麵包與鹼水結深受當地人喜愛，也是這座城市德國記憶的延續。"
      }
    ];

    let map, infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15
      });
      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title
        });
        marker.addListener("click", () => openInfoWindow(place, marker));
        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      const content = `
        <div style="max-width:240px; padding:5px;">
          <h3 style="margin:0 0 8px; font-size:16px; color:#333;">${place.title}</h3>
          <img src="${place.imageUrl}" referrerpolicy="no-referrer" style="width:100%; height:140px; object-fit:cover; border-radius:6px; margin-bottom:8px;" />
          <p style="margin:0; font-size:13px; color:#666; line-height:1.4;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <h3>${place.title}</h3>
          <p>${place.description}</p>
          <small>📍 點擊在地圖查看詳情</small>
        `;
        item.addEventListener("click", () => openInfoWindow(place, place._marker));
        listEl.appendChild(item);
      });
    }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqqo4xar0xJ3Z5GC-TLd4MRnsGYszCL1k&callback=initMap"></script>
</body>
</html>
