<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳地圖 - 交通預估版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --bg-light: #f8faf8; }
        body { font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; }

        /* 景點主視窗 */
        #detail-modal {
            border: none; border-radius: 24px; padding: 0; width: 92%; max-width: 500px;
            height: 85vh; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        
        .modal-header { 
            background: var(--primary-color); color: white; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { height: calc(85vh - 60px); overflow-y: auto; background: white; display: flex; flex-direction: column; }

        /* 導航與交通區塊 */
        .nav-section { padding: 15px; border-bottom: 1px solid #eee; }
        .nav-grid { display: flex; gap: 10px; margin-bottom: 12px; }
        .nav-item { 
            flex: 1; padding: 10px; border: 1px solid #eee; border-radius: 12px; 
            background: #fff; text-align: center; font-size: 13px; color: #333;
        }
        
        /* 交通資訊列 (新加入) */
        .transport-info {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            padding: 8px; margin-bottom: 12px; background: #fffbe6; 
            border: 1px dashed #ffe58f; border-radius: 10px; font-size: 13px; color: #856404;
        }

        .note-box { 
            font-size: 15px; color: #444; line-height: 1.6; padding: 15px; 
            background: var(--bg-light); border-radius: 12px; border-left: 5px solid var(--primary-color);
        }

        /* 搜尋框架 */
        .web-container { flex: 1; min-height: 400px; border-top: 1px solid #eee; }
        .web-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="map"></div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold; font-size: 18px;">景點詳情</span>
        <button style="background:none; border:none; color:white; font-size:32px; cursor:pointer;" onclick="this.closest('dialog').close()">×</button>
    </div>
    <div class="modal-body">
        <div class="nav-section">
            <div class="nav-grid">
                <div id="prev-btn" class="nav-item" style="cursor:pointer">
                    <div style="font-size:10px; color:#999">← 上一站</div>
                    <div id="prev-title" style="font-weight:bold">---</div>
                </div>
                <div id="next-btn" class="nav-item" style="cursor:pointer">
                    <div style="font-size:10px; color:#999">下一站 →</div>
                    <div id="next-title" style="font-weight:bold">---</div>
                </div>
            </div>

            <div id="transport-bar" class="transport-info">
                <span id="trans-method">🚗 自駕</span>
                <span id="trans-dist">距離: -- km</span>
                <span id="trans-time">時間: -- min</span>
            </div>

            <div id="modal-note" class="note-box"></div>
        </div>

        <div class="web-container">
            <iframe id="info-frame" class="web-frame" src=""></iframe>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([38.9442, 141.0505], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 模擬 AI 生成的完整 JSON 結構
    let allPoints = [
        { 
            "title": "平泉中尊寺", "lat": 38.9868, "lng": 141.1141, "note": "世界文化遺產，金色堂。",
            "trans": { "m": "🚗", "d": "12km", "t": "15min" }
        },
        { 
            "title": "嚴美溪", "lat": 38.9442, "lng": 141.0505, 
            "note": "Day 3: 觀察「郭公糰子」的滑索物理機制。",
            "trans": { "m": "🚗", "d": "18km", "t": "25min" }
        },
        { 
            "title": "盛岡手工藝村", "lat": 39.7186, "lng": 141.0991, "note": "體驗南部鐵器製作。",
            "trans": { "m": "🚗", "d": "--", "t": "--" }
        }
    ];

    function openDetail(index) {
        const p = allPoints[index];
        
        // 更新標題與筆記
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-note').innerText = p.note;

        // 更新交通資訊 (從 JSON 讀取)
        if (p.trans) {
            document.getElementById('transport-bar').style.display = 'flex';
            document.getElementById('trans-method').innerText = p.trans.m + " 交通";
            document.getElementById('trans-dist').innerText = "距離: " + p.trans.d;
            document.getElementById('trans-time').innerText = "預估: " + p.trans.t;
        } else {
            document.getElementById('transport-bar').style.display = 'none';
        }

        // 更新導航標題
        document.getElementById('prev-title').innerText = allPoints[index-1]?.title || "起點";
        document.getElementById('next-title').innerText = allPoints[index+1]?.title || "終點";
        
        // 綁定點擊事件
        document.getElementById('prev-btn').onclick = () => index > 0 && openDetail(index-1);
        document.getElementById('next-btn').onclick = () => index < allPoints.length-1 && openDetail(index+1);

        // 載入 Google 搜尋 (模擬 AI 預估結果)
        document.getElementById('info-frame').src = `https://www.google.com/search?q=${encodeURIComponent(p.title + " 景點 介紹")}&igu=1`;

        document.getElementById('detail-modal').showModal();
        map.panTo([p.lat, p.lng]);
    }

    // 初始化針頭 (略，同之前邏輯)
    allPoints.forEach((p, i) => {
        L.marker([p.lat, p.lng]).addTo(map).on('click', () => openDetail(i));
    });
</script>
</body>
</html>
