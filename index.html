<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳地圖 - 內嵌優化版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --accent-blue: #007aff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f2; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; background: rgba(255,255,255,0.9);
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 景點主視窗 */
        #detail-modal {
            border: none; border-radius: 20px; padding: 0; width: 92%; max-width: 500px;
            height: 80vh; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease-out;
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        
        .modal-header { 
            background: var(--primary-color); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { 
            height: calc(80vh - 65px); overflow-y: auto; display: flex; flex-direction: column;
        }

        /* 導航區 */
        .nav-links { display: flex; justify-content: space-between; padding: 15px; gap: 10px; background: #fff; }
        .nav-btn { 
            flex: 1; padding: 8px; border: 1px solid #eee; border-radius: 8px; 
            background: #fff; cursor: pointer; text-align: center;
        }
        .nav-btn:disabled { opacity: 0.3; }

        /* 內嵌網頁區 (重點修正) */
        .web-container { flex: 1; position: relative; border-top: 1px solid #ddd; background: #eee; }
        .web-frame { width: 100%; height: 100%; border: none; background: white; }
        
        /* 覆蓋層：當 iframe 被阻擋時的提示 */
        .frame-error {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #f9f9f9; text-align: center; padding: 20px; box-sizing: border-box;
            z-index: -1; /* 預設在後方 */
        }

        .custom-pin img { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--primary-color); color: white; font-weight: bold;" onclick="exportData()">📤 匯出</button>
    <button style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--accent-blue); color: white; font-weight: bold;" onclick="document.getElementById('fileInput').click()">📥 匯入</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold;">景點導覽</span>
        <button style="background:none; border:none; color:white; font-size:30px; cursor:pointer;" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
        <div class="nav-links">
            <button id="prev-btn" class="nav-btn"><small>← 上一站</small><div id="prev-title" style="font-weight:bold; font-size:12px;"></div></button>
            <button id="next-btn" class="nav-btn"><small>下一站 →</small><div id="next-title" style="font-weight:bold; font-size:12px;"></div></button>
        </div>
        
        <div style="padding: 0 15px 15px;">
            <div id="modal-note" style="font-size:14px; color:#555; line-height:1.4;"></div>
        </div>

        <div class="web-container">
            <div class="frame-error">
                <p style="font-size:14px; color:#666;">此網頁限制在視窗內開啟</p>
                <a id="fallback-link" href="#" target="_blank" style="color:var(--accent-blue); font-weight:bold; text-decoration:none;">直接點此開啟全版網頁</a>
            </div>
            <iframe id="info-frame" class="web-frame" src=""></iframe>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([39.7020, 141.1545], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allPoints = [
        { "date": "05/31", "lat": 38.2526, "lng": 140.8739, "title": "瑞鳳殿", "note": "伊達政宗靈廟", "wikiUrl": "https://zh.m.wikipedia.org/wiki/瑞鳳殿" }
    ];

    let markerList = [];
    let currentActiveMarker = null;

    function getPinColor(date) {
        const uniqueDates = [...new Set(allPoints.map(p => p.date))].sort();
        const colors = ['blue', 'red', 'orange', 'violet', 'green', 'gold', 'grey', 'black'];
        return colors[uniqueDates.indexOf(date) % colors.length];
    }

    function createIcon(color, isBig) {
        const size = isBig ? [45, 73] : [26, 42];
        return L.divIcon({
            className: 'custom-pin',
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${size[0]}px;height:${size[1]}px;">`,
            iconSize: size, iconAnchor: [size[0]/2, size[1]]
        });
    }

    function openDetail(index) {
        const p = allPoints[index];
        const targetMarker = markerList[index];

        map.panTo([p.lat, p.lng], { animate: true });
        setTimeout(() => map.panBy([0, -150], { animate: true }), 250);

        if (currentActiveMarker && currentActiveMarker !== targetMarker) {
            const prevIdx = markerList.indexOf(currentActiveMarker);
            currentActiveMarker.setIcon(createIcon(getPinColor(allPoints[prevIdx].date), false));
        }
        targetMarker.setIcon(createIcon(getPinColor(p.date), true));
        targetMarker.setZIndexOffset(1000);
        currentActiveMarker = targetMarker;

        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-note').innerText = p.note;

        // 解決空白問題：
        // 1. 強制使用行動版網址 (.m.wikipedia)
        // 2. Wikipedia 內嵌限制非常嚴，若依然空白，Fallback 提示會出現
        const mobileWiki = p.wikiUrl.replace('zh.wikipedia', 'zh.m.wikipedia').replace('ja.wikipedia', 'ja.m.wikipedia');
        document.getElementById('info-frame').src = mobileWiki;
        document.getElementById('fallback-link').href = mobileWiki;

        const pb = document.getElementById('prev-btn'), nb = document.getElementById('next-btn');
        if (index > 0) {
            pb.disabled = false; document.getElementById('prev-title').innerText = allPoints[index-1].title;
            pb.onclick = () => openDetail(index - 1);
        } else { pb.disabled = true; document.getElementById('prev-title').innerText = "旅程起點"; }
        
        if (index < allPoints.length - 1) {
            nb.disabled = false; document.getElementById('next-title').innerText = allPoints[index+1].title;
            nb.onclick = () => openDetail(index + 1);
        } else { nb.disabled = true; document.getElementById('next-title').innerText = "旅程終點"; }

        document.getElementById('detail-modal').showModal();
    }

    function closeModal() { document.getElementById('detail-modal').close(); }

    function render() {
        markerList.forEach(m => map.removeLayer(m));
        markerList = [];
        allPoints.forEach((p, index) => {
            const m = L.marker([p.lat, p.lng], { icon: createIcon(getPinColor(p.date), false) }).on('click', () => openDetail(index));
            m.addTo(map);
            markerList.push(m);
        });
    }

    function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            allPoints = JSON.parse(e.target.result);
            render();
            currentActiveMarker = null;
        };
        reader.readAsText(file);
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(allPoints, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `White6_Route.json`;
        a.click();
    }

    render();
</script>
</body>
</html>
