<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城導覽 - 棧橋實景版</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #f0f2f5;
    }
    #map {
      flex: 2;
      height: 100%;
    }
    #sidebar {
      flex: 1;
      max-width: 380px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #d1d5db;
      box-sizing: border-box;
      background: #ffffff;
    }
    .place {
      margin-bottom: 24px;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      border: 1px solid #eee;
    }
    .place:hover {
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      transform: translateY(-4px);
    }
    .place img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .place-content {
      padding: 16px;
    }
    .place h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #1a202c;
    }
    .place p {
      margin: 0;
      font-size: 14px;
      color: #4a5568;
      line-height: 1.6;
    }
    h2 { color: #2d3748; margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島景點導覽</h2>
    <p style="color:#718096; font-size:14px; margin-bottom:20px;">使用您提供的實景照片進行導覽。</p>
    <div id="place-list"></div>
  </div>

  <script>
    const places = [
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        // 使用您提供的實景網址
        imageUrl: "https://tse4.mm.bing.net/th/id/OIP.djmABa5uF4YmtevUnML2BQHaFY?pid=ImgDetMain",
        description: "青島最具代表性的地標。回瀾閣是一座雙層八角亭，站在閣上可以觀賞『長虹遠引』與『回瀾拍岸』的壯麗景色。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://images.unsplash.com/photo-1548625361-12503254203a?auto=format&fit=crop&w=800",
        description: "聖彌額爾大教堂，德式雙塔建築。老城區最浪漫的背景，常有新人在此拍攝婚紗。"
      },
      {
        id: "indigo",
        title: "青島英迪格酒店",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=800",
        description: "位於老城核心，融合了青島特有的里院文化與現代設計，是探索老街的絕佳起點。"
      }
      // 其他景點可依此類推增加...
    ];

    let map;
    let infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15
      });

      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title
        });

        marker.addListener("click", () => {
          openInfoWindow(place, marker);
        });

        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      const content = `
        <div style="max-width:240px;">
          <h3 style="margin:0 0 8px;">${place.title}</h3>
          <img src="${place.imageUrl}" 
               referrerpolicy="no-referrer" 
               style="width:100%; height:140px; object-fit:cover; border-radius:6px; margin-bottom:8px;" />
          <p style="margin:0; font-size:13px; color:#555;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <img src="${place.imageUrl}" referrerpolicy="no-referrer">
          <div class="place-content">
            <h3>${place.title}</h3>
            <p>${place.description}</p>
          </div>
        `;
        item.addEventListener("click", () => {
          openInfoWindow(place, place._marker);
        });
        listEl.appendChild(item);
      });
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqqo4xar0xJ3Z5GC-TLd4MRnsGYszCL1k&callback=initMap">
  </script>
</body>
</html>
