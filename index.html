<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳地圖 - 點擊修復版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --accent-blue: #007aff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f2; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; background: rgba(255,255,255,0.9);
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #detail-modal {
            border: none; border-radius: 20px; padding: 0; width: 92%; max-width: 500px;
            height: 80vh; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        
        .modal-header { 
            background: var(--primary-color); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { height: calc(80vh - 65px); overflow-y: auto; display: flex; flex-direction: column; }

        .nav-links { display: flex; justify-content: space-between; padding: 15px; gap: 10px; background: #fff; }
        .nav-btn { flex: 1; padding: 10px; border: 1px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.3; }

        .web-container { flex: 1; position: relative; border-top: 1px solid #ddd; }
        .web-frame { width: 100%; height: 100%; border: none; background: white; }

        .custom-pin img { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer;" onclick="exportData()">📤 匯出</button>
    <button style="padding: 10px 18px; border-radius: 20px; border: none; background: var(--accent-blue); color: white; font-weight: bold; cursor: pointer;" onclick="document.getElementById('fileInput').click()">📥 匯入</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold;">景點導覽</span>
        <button style="background:none; border:none; color:white; font-size:30px; cursor:pointer;" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
        <div class="nav-links">
            <button id="prev-btn" class="nav-btn"><small>← 上一站</small><div id="prev-title" style="font-weight:bold; font-size:12px;"></div></button>
            <button id="next-btn" class="nav-btn"><small>下一站 →</small><div id="next-title" style="font-weight:bold; font-size:12px;"></div></button>
        </div>
        <div style="padding: 10px 15px;"><div id="modal-note" style="font-size:14px; color:#555;"></div></div>
        <div class="web-container">
            <iframe id="info-frame" class="web-frame" src=""></iframe>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([39.7020, 141.1545], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allPoints = [
        { "date": "05/31", "lat": 38.2526, "lng": 140.8739, "title": "瑞鳳殿", "note": "伊達政宗靈廟", "wikiUrl": "https://zh.m.wikipedia.org/wiki/瑞鳳殿" }
    ];

    let markerList = [];
    let currentActiveMarker = null;

    function getPinColor(date) {
        const uniqueDates = [...new Set(allPoints.map(p => p.date))].sort();
        const colors = ['blue', 'red', 'orange', 'violet', 'green', 'gold', 'grey', 'black'];
        return colors[uniqueDates.indexOf(date) % colors.length];
    }

    function createIcon(color, isBig) {
        const size = isBig ? [45, 73] : [26, 42];
        return L.divIcon({
            className: 'custom-pin',
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${size[0]}px;height:${size[1]}px;">`,
            iconSize: size, iconAnchor: [size[0]/2, size[1]]
        });
    }

    // 點擊針頭的核心功能
    function openDetail(index) {
        const p = allPoints[index];
        if (!p) return;

        // 1. 地圖中心位移
        map.panTo([p.lat, p.lng], { animate: true });
        setTimeout(() => map.panBy([0, -150], { animate: true }), 200);

        // 2. 針頭縮放切換
        if (currentActiveMarker) {
            const oldIdx = markerList.indexOf(currentActiveMarker);
            if (oldIdx !== -1) {
                currentActiveMarker.setIcon(createIcon(getPinColor(allPoints[oldIdx].date), false));
            }
        }
        const targetMarker = markerList[index];
        targetMarker.setIcon(createIcon(getPinColor(p.date), true));
        targetMarker.setZIndexOffset(1000);
        currentActiveMarker = targetMarker;

        // 3. 彈窗內容設置
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-note').innerText = p.note;
        
        // 維基連結處理
        const wikiLink = p.wikiUrl.replace('zh.wikipedia', 'zh.m.wikipedia').replace('ja.wikipedia', 'ja.m.wikipedia');
        document.getElementById('info-frame').src = wikiLink;

        // 4. 導航按鈕更新
        const pb = document.getElementById('prev-btn'), nb = document.getElementById('next-btn');
        if (index > 0) {
            pb.disabled = false;
            document.getElementById('prev-title').innerText = allPoints[index-1].title;
            pb.onclick = () => openDetail(index - 1);
        } else {
            pb.disabled = true;
            document.getElementById('prev-title').innerText = "起點";
        }

        if (index < allPoints.length - 1) {
            nb.disabled = false;
            document.getElementById('next-title').innerText = allPoints[index+1].title;
            nb.onclick = () => openDetail(index + 1);
        } else {
            nb.disabled = true;
            document.getElementById('next-title').innerText = "終點";
        }

        // 5. 顯示彈窗
        document.getElementById('detail-modal').showModal();
    }

    function closeModal() {
        document.getElementById('detail-modal').close();
    }

    function renderMarkers() {
        // 清除舊針頭
        markerList.forEach(m => map.removeLayer(m));
        markerList = [];

        allPoints.forEach((p, index) => {
            const color = getPinColor(p.date);
            const marker = L.marker([p.lat, p.lng], { icon: createIcon(color, false) });
            
            // 確保點擊事件被綁定
            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e); // 防止地圖點擊事件干擾
                openDetail(index);
            });

            marker.addTo(map);
            markerList.push(marker);
        });
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                allPoints = JSON.parse(e.target.result);
                renderMarkers();
                currentActiveMarker = null;
            } catch (err) {
                alert("檔案格式錯誤");
            }
        };
        reader.readAsText(file);
    }

    function exportData() {
        const data = JSON.stringify(allPoints, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "White6_Route.json";
        a.click();
    }

    // 初始化執行
    renderMarkers();
</script>
</body>
</html>
