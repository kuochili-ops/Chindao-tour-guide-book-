<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳地圖 - 焦點鎖定版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --bg-color: #f4f4f2; --accent-blue: #4a90e2; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg-color); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; background: rgba(255,255,255,0.9);
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #detail-modal {
            border: none; border-radius: 16px; padding: 0; width: 85%; max-width: 550px;
            max-height: 85vh; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.3s ease-out;
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        
        .modal-header { 
            background: var(--primary-color); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .modal-body { padding: 20px; overflow-y: auto; }
        .modal-close { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .nav-links { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .nav-btn { 
            flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; 
            background: #fff; cursor: pointer; font-size: 13px; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }
        .nav-btn:hover:not(:disabled) { background: #f0f7f0; border-color: var(--primary-color); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-label { font-size: 11px; color: #888; margin-bottom: 4px; }

        .wiki-section { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; }
        details summary { 
            list-style: none; cursor: pointer; color: var(--accent-blue); 
            font-weight: bold; text-align: center; padding: 8px;
            border: 1px solid var(--accent-blue); border-radius: 6px;
        }
        details[open] summary { background: var(--accent-blue); color: white; margin-bottom: 10px; }
        .wiki-iframe { width: 100%; height: 350px; border: 1px solid #ddd; border-radius: 8px; }

        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn-export { background: var(--primary-color); color: white; }
        .btn-import { background: var(--accent-blue); color: white; }

        /* Marker 縮放動畫 */
        .custom-pin img { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button class="btn btn-export" onclick="exportData()">📤 匯出</button>
    <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">📥 匯入</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-size: 18px;">景點詳解</span>
        <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
        <div class="nav-links">
            <button id="prev-btn" class="nav-btn">
                <span class="nav-label">← 上一站</span>
                <span id="prev-title">---</span>
            </button>
            <button id="next-btn" class="nav-btn">
                <span class="nav-label">下一站 →</span>
                <span id="next-title">---</span>
            </button>
        </div>
        <div id="modal-date" style="color: #666; font-weight: bold; margin-bottom: 5px;"></div>
        <div id="modal-note" style="line-height: 1.6; color: #333; margin-bottom: 20px; font-size: 15px;"></div>
        <div class="wiki-section">
            <details id="wiki-details">
                <summary>📖 顯示維基百科介紹</summary>
                <iframe id="wiki-frame" class="wiki-iframe" src=""></iframe>
            </details>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([39.7020, 141.1545], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    let allPoints = [
        { "date": "05/31", "lat": 38.2526, "lng": 140.8739, "title": "瑞鳳殿", "note": "🚗 下一站：仙台城跡 (約 10 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/瑞鳳殿" },
        { "date": "05/31", "lat": 38.2603, "lng": 140.8562, "title": "仙台城跡", "note": "🚗 明日首站：東澤玫瑰公園 (約 1 hr 10 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/仙台城" },
        { "date": "06/01", "lat": 38.4833, "lng": 140.3833, "title": "東澤玫瑰公園", "note": "🚗 下一站：中尊寺 (約 1 hr 30 min)", "wikiUrl": "https://ja.m.wikipedia.org/wiki/東沢バラ公園" },
        { "date": "06/01", "lat": 38.9868, "lng": 141.1141, "title": "平泉中尊寺", "note": "🚗 明日首站：嚴美溪 (約 15 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/中尊寺" },
        { "date": "06/02", "lat": 38.9442, "lng": 141.0505, "title": "嚴美溪", "note": "🚗 下一站：盛岡手工藝村 (約 1 hr 10 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/嚴美溪" },
        { "date": "06/02", "lat": 39.7186, "lng": 141.0991, "title": "盛岡手工藝村", "note": "🚗 明日首站：角館 (約 1 hr)", "wikiUrl": "https://ja.m.wikipedia.org/wiki/盛岡手づくり村" },
        { "date": "06/03", "lat": 39.5994, "lng": 140.5619, "title": "角館武家屋敷", "note": "🚗 下一站：田澤湖 (約 30 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/角館" },
        { "date": "06/03", "lat": 39.7225, "lng": 140.6653, "title": "田澤湖", "note": "🚗 明日首站：十和田湖 (約 2 hr 15 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/田澤湖" },
        { "date": "06/04", "lat": 40.4302, "lng": 140.8913, "title": "十和田湖", "note": "🚗 下一站：奧入瀨溪流 (約 20 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/十和田湖" },
        { "date": "06/04", "lat": 40.4728, "lng": 140.9592, "title": "奧入瀨溪流", "note": "🚗 明日首站：十和田市現代美術館 (約 50 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/奧入瀨溪流" },
        { "date": "06/05", "lat": 40.6136, "lng": 141.2131, "title": "十和田市現代美術館", "note": "🚗 下一站：睡魔之家 (約 1 hr 15 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/十和田市現代美術館" },
        { "date": "06/05", "lat": 40.8291, "lng": 140.7481, "title": "睡魔之家 Wa Rasse", "note": "🚗 旁邊即是：A-Factory (步行 3 min)", "wikiUrl": "https://ja.m.wikipedia.org/wiki/ねぶたの家_ワ・拉塞" },
        { "date": "06/06", "lat": 40.8299, "lng": 140.7455, "title": "A-Factory", "note": "🚗 下一站：三內丸山遺跡 (約 15 min)", "wikiUrl": "https://ja.m.wikipedia.org/wiki/A-FACTORY" },
        { "date": "06/06", "lat": 40.8105, "lng": 140.6974, "title": "三內丸山遺跡", "note": "🚗 終點：新青森站 (10 min)", "wikiUrl": "https://zh.m.wikipedia.org/wiki/三內丸山遺跡" }
    ];

    const colorPalette = ['blue', 'red', 'orange', 'violet', 'green', 'gold', 'grey', 'black'];
    let markersLayer = L.layerGroup().addTo(map);
    let markerList = []; // 儲存 marker 物件引用
    let currentActiveMarker = null; // 當前放大中的 marker

    // 建立 Icon 的輔助函式
    function createPinIcon(color, isBig = false) {
        const size = isBig ? [35, 57] : [25, 41];
        const anchor = isBig ? [17, 57] : [12, 41];
        return L.divIcon({
            className: 'custom-pin',
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${size[0]}px; height:${size[1]}px;">`,
            iconSize: size,
            iconAnchor: anchor
        });
    }

    function openDetail(index) {
        const p = allPoints[index];
        const targetMarker = markerList[index];

        // 處理 Marker 縮放邏輯
        if (currentActiveMarker && currentActiveMarker !== targetMarker) {
            // 將前一個選中的縮小（獲取原本顏色）
            const prevIndex = markerList.indexOf(currentActiveMarker);
            const prevColor = getMarkerColor(allPoints[prevIndex].date);
            currentActiveMarker.setIcon(createPinIcon(prevColor, false));
            currentActiveMarker.setZIndexOffset(0);
        }

        // 放大當前選中的
        const currentColor = getMarkerColor(p.date);
        targetMarker.setIcon(createPinIcon(currentColor, true));
        targetMarker.setZIndexOffset(1000); // 確保在最上層
        currentActiveMarker = targetMarker;

        // 更新 Modal 內容
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-date').innerText = `🗓️ ${p.date}`;
        document.getElementById('modal-note').innerText = p.note;
        document.getElementById('wiki-frame').src = p.wikiUrl.replace('.wikipedia', '.m.wikipedia');
        document.getElementById('wiki-details').open = false;

        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        if (index > 0) {
            prevBtn.disabled = false;
            document.getElementById('prev-title').innerText = allPoints[index-1].title;
            prevBtn.onclick = () => openDetail(index - 1);
        } else {
            prevBtn.disabled = true;
            document.getElementById('prev-title').innerText = "起點";
        }

        if (index < allPoints.length - 1) {
            nextBtn.disabled = false;
            document.getElementById('next-title').innerText = allPoints[index+1].title;
            nextBtn.onclick = () => openDetail(index + 1);
        } else {
            nextBtn.disabled = true;
            document.getElementById('next-title').innerText = "終點";
        }

        document.getElementById('detail-modal').showModal();
    }

    function closeModal() {
        document.getElementById('detail-modal').close();
        // 注意：依照需求，關閉視窗後不縮小圖示，因此這裡不處理 marker
    }

    function getMarkerColor(date) {
        const uniqueDates = [...new Set(allPoints.map(p => p.date))].sort();
        const index = uniqueDates.indexOf(date);
        return colorPalette[index % colorPalette.length];
    }

    function renderAll() {
        markersLayer.clearLayers();
        markerList = [];
        
        allPoints.forEach((p, index) => {
            const color = getMarkerColor(p.date);
            const icon = createPinIcon(color, false);
            const marker = L.marker([p.lat, p.lng], { icon }).on('click', () => openDetail(index));
            
            markersLayer.addLayer(marker);
            markerList.push(marker);
        });
    }

    renderAll();

    function exportData() {
        const blob = new Blob([JSON.stringify(allPoints, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `White6_Route_Focus.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            allPoints = JSON.parse(e.target.result);
            renderAll();
            currentActiveMarker = null;
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
