<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城＆海邊景點導覽</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      background-color: #f8f9fa;
    }
    #map {
      flex: 2;
      height: 100%;
    }
    #sidebar {
      flex: 1;
      max-width: 380px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #e0e0e0;
      box-sizing: border-box;
      background: white;
    }
    .place {
      margin-bottom: 24px;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }
    .place:hover {
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
      transform: translateY(-3px);
    }
    .place img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .place-content {
      padding: 15px;
    }
    .place h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #2c3e50;
    }
    .place p {
      margin: 0;
      font-size: 13px;
      color: #7f8c8d;
      line-height: 1.6;
    }
    .place small {
      display: inline-block;
      margin-top: 10px;
      color: #3498db;
      font-weight: 600;
      font-size: 12px;
    }
    h2 { color: #2c3e50; margin-top: 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島老城導覽</h2>
    <p style="color:#95a5a6; font-size:14px; margin-bottom:20px;">探索紅瓦綠樹、碧海藍天的老城魅力。</p>
    <div id="place-list"></div>
  </div>

  <script>
    // 使用 Unsplash 穩定圖源，關鍵字匹配景點意象
    const places = [
      {
        id: "indigo",
        title: "青島英迪格酒店 Hotel Indigo",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=600&q=80",
        description: "精緻的設計酒店，完美融合青島老城的德式建築元素與現代舒適。"
      },
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        imageUrl: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80",
        description: "青島的象徵，延伸入海的長廊與亭閣，是欣賞海上日落的絕佳位置。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://images.unsplash.com/photo-1548625361-12503254203a?auto=format&fit=crop&w=600&q=80",
        description: "聖彌額爾大教堂，雙塔尖頂的德式美學，是老城區最具靈氣的地標。"
      },
      {
        id: "zhongshan-road",
        title: "中山路老街",
        lat: 36.0700,
        lng: 120.3235,
        imageUrl: "https://images.unsplash.com/photo-1555992336-fb0d291986ce?auto=format&fit=crop&w=600&q=80",
        description: "穿梭在百年老鋪與紅磚瓦房間，感受青島最道地的市井煙火氣。"
      },
      {
        id: "ship-dumpling",
        title: "船歌魚水餃",
        lat: 36.0690,
        lng: 120.3245,
        imageUrl: "https://images.unsplash.com/photo-1563245372-f21724e3856d?auto=format&fit=crop&w=600&q=80",
        description: "青島美食名片，墨魚與黃花魚入餡，咬開後的鮮甜是大海的味道。"
      },
      {
        id: "liu-seafood",
        title: "劉氏海鮮燒烤",
        lat: 36.0730,
        lng: 120.3260,
        imageUrl: "https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=600&q=80",
        description: "炭火上的鮮味，配上剛出廠的青島啤酒，是夏日夜晚的最佳註解。"
      },
      {
        id: "beer-house",
        title: "青島啤酒館",
        lat: 36.0745,
        lng: 120.3250,
        imageUrl: "https://images.unsplash.com/photo-1535958636474-b021ee887b13?auto=format&fit=crop&w=600&q=80",
        description: "聞著酒香找路，體驗這座城市血液裡流動的啤酒文化。"
      },
      {
        id: "small-beer-hut",
        title: "小木屋啤酒屋",
        lat: 36.0605,
        lng: 120.3190,
        imageUrl: "https://images.unsplash.com/photo-1518176258769-f227c798150e?auto=format&fit=crop&w=600&q=80",
        description: "簡約的海岸小屋，是旅行者與海浪對話的溫馨角落。"
      },
      {
        id: "cafe-1907",
        title: "1907 咖啡館",
        lat: 36.0645,
        lng: 120.3220,
        imageUrl: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=600&q=80",
        description: "在百年古蹟中靜靜品味一杯手沖，時光彷彿在此慢了下來。"
      },
      {
        id: "german-bakery",
        title: "德國麵包房",
        lat: 36.0680,
        lng: 120.3215,
        imageUrl: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
        description: "紮實的黑麥香氣，承襲百年的歐式工藝，簡單卻讓人懷念。"
      }
    ];

    let map;
    let infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15,
        styles: [
          { "featureType": "poi.business", "stylers": [{ "visibility": "off" }] }
        ]
      });

      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title,
          animation: google.maps.Animation.DROP
        });

        marker.addListener("click", () => {
          openInfoWindow(place, marker);
        });

        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      const content = `
        <div style="max-width:240px; padding:5px;">
          <h3 style="margin:0 0 8px; font-size:16px;">${place.title}</h3>
          <img src="${place.imageUrl}" style="width:100%; height:140px; object-fit:cover; border-radius:6px; margin-bottom:8px;" />
          <p style="margin:0; font-size:13px; color:#555; line-height:1.5;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <img src="${place.imageUrl}">
          <div class="place-content">
            <h3>${place.title}</h3>
            <p>${place.description}</p>
            <small>📍 點擊查看地圖</small>
          </div>
        `;
        item.addEventListener("click", () => {
          openInfoWindow(place, place._marker);
        });
        listEl.appendChild(item);
      });
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqqo4xar0xJ3Z5GC-TLd4MRnsGYszCL1k&callback=initMap">
  </script>
</body>
</html>
