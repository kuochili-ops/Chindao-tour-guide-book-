<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白六快傳地圖 - 旅行全攻略</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --accent-blue: #007aff; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; overflow: hidden; background: #f4f4f2; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* 介面按鈕 */
        .controls { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 15px; background: rgba(255,255,255,0.9);
            padding: 12px 25px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }
        .btn { padding: 10px 22px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-export { background: var(--primary-color); }
        .btn-import { background: var(--accent-blue); }
        .btn:active { transform: scale(0.92); }

        /* 中尺寸彈窗 */
        #detail-modal {
            border: none; border-radius: 28px; padding: 0; width: 92%; max-width: 500px;
            height: 85vh; box-shadow: 0 25px 70px rgba(0,0,0,0.5); outline: none; overflow: hidden;
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        
        .modal-header { background: var(--primary-color); color: white; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { height: calc(85vh - 65px); overflow-y: auto; background: white; display: flex; flex-direction: column; }

        /* 資訊面板區 */
        .info-panel { padding: 18px; border-bottom: 1px solid #eee; background: #fff; }
        
        /* 日期與標題 */
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .date-badge { padding: 4px 14px; border-radius: 15px; color: white; font-size: 12px; font-weight: bold; }
        
        /* 旅程估算欄位 (重點更新) */
        .travel-est {
            background: #fffbe6; border: 1px solid #ffe58f; border-radius: 15px;
            padding: 14px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .est-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #856404; }
        .est-main { font-weight: bold; font-size: 15px; }

        /* 筆記區 */
        .note-box { font-size: 15px; color: #333; line-height: 1.6; padding: 15px; background: #f9fdf9; border-radius: 15px; border-left: 6px solid var(--primary-color); }

        /* Google AI 搜尋區 */
        .web-container { flex: 1; min-height: 400px; background: #fff; border-top: 1px solid #eee; }
        .web-frame { width: 100%; height: 100%; border: none; }

        .custom-pin img { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button class="btn btn-export" onclick="exportData()">📤 匯出 JSON</button>
    <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">📥 匯入 JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold; font-size: 1.1rem;">景點導覽</span>
        <button style="background:none; border:none; color:white; font-size:35px; cursor:pointer; line-height:1;" onclick="this.closest('dialog').close()">×</button>
    </div>
    <div class="modal-body">
        <div class="info-panel">
            <div class="top-row">
                <div id="modal-date-tag" class="date-badge">日期載入中</div>
                <div style="font-size: 12px; color: #999;">旅行計畫 / Day Note</div>
            </div>
            
            <div id="est-box" class="travel-est">
                <div class="est-row est-main">
                    <span id="est-method">🚗 交通方式</span>
                    <span style="font-size: 12px; opacity: 0.8;">NEXT STOP</span>
                </div>
                <div class="est-row">
                    <span id="est-dist">距離：-- km</span>
                    <span id="est-time">預計：-- min</span>
                </div>
            </div>

            <div id="modal-note" class="note-box"></div>
        </div>
        
        <div class="web-container">
            <iframe id="info-frame" class="web-frame" src="about:blank"></iframe>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([38.5, 140.8], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allPoints = [];
    let markerList = [];

    // 日期顏色對應表 (根據 Day 1~Day 6 邏輯)
    const colorMap = {
        "05/31": "blue",   // Day 1
        "06/01": "red",    // Day 2
        "06/02": "orange", // Day 3
        "06/03": "violet", // Day 4
        "06/04": "green",  // Day 5
        "06/05": "gold",   // Day 6
        "06/06": "black"   // Day 7
    };

    function getPinColor(date) {
        return colorMap[date] || "grey";
    }

    function createIcon(color, isBig) {
        const size = isBig ? [46, 75] : [28, 45];
        return L.divIcon({
            className: 'custom-pin',
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${size[0]}px;height:${size[1]}px;">`,
            iconSize: size, iconAnchor: [size[0]/2, size[1]]
        });
    }

    function openDetail(index) {
        const p = allPoints[index];
        const color = getPinColor(p.date);

        // 1. 更新日期與視覺顏色
        const dateTag = document.getElementById('modal-date-tag');
        dateTag.innerText = `📅 ${p.date}`;
        dateTag.style.backgroundColor = (color === 'gold' ? '#d4a017' : color);

        // 2. 呈現旅程估算 (讀取 trans 結構)
        const estBox = document.getElementById('est-box');
        if (p.trans) {
            estBox.style.display = 'flex';
            document.getElementById('est-method').innerText = (p.trans.m || "🚗") + " 前往下一站";
            document.getElementById('est-dist').innerText = `距離：${p.trans.d || "--"}`;
            document.getElementById('est-time').innerText = `時間：${p.trans.t || "--"}`;
        } else {
            estBox.style.display = 'none'; // 若無下一站資料則隱藏
        }

        // 3. 填入標題與筆記
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-note').innerHTML = p.note.replace(/\n/g, '<br>');

        // 4. 載入 Google 搜尋內容 (AI 預估模式)
        const searchQuery = encodeURIComponent(p.title + " 景點 介紹");
        document.getElementById('info-frame').src = `https://www.google.com/search?q=${searchQuery}&igu=1`;

        // 5. 視窗與地圖連動
        document.getElementById('detail-modal').showModal();
        map.panTo([p.lat, p.lng], { animate: true });
        
        // 放大當前針頭
        markerList.forEach((m, i) => m.setIcon(createIcon(getPinColor(allPoints[i].date), i === index)));
    }

    function renderMarkers() {
        markerList.forEach(m => map.removeLayer(m));
        markerList = [];
        allPoints.forEach((p, i) => {
            const color = getPinColor(p.date);
            const m = L.marker([p.lat, p.lng], { icon: createIcon(color, false) });
            m.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                openDetail(i);
            });
            m.addTo(map);
            markerList.push(m);
        });
        if (markerList.length > 0) {
            const group = new L.featureGroup(markerList);
            map.fitBounds(group.getBounds().pad(0.3));
        }
    }

    // 匯入與匯出
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                allPoints = JSON.parse(e.target.result);
                renderMarkers();
            } catch (err) { alert("JSON 格式不正確"); }
        };
        reader.readAsText(file);
    }

    function exportData() {
        if (allPoints.length === 0) return alert("目前無資料可匯出");
        const blob = new Blob([JSON.stringify(allPoints, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `White6_TravelPlan.json`;
        a.click();
    }
</script>
</body>
</html>
