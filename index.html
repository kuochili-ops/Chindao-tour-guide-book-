<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳地圖 - 子視窗導覽版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #2d5a27; --bg-color: #f4f4f2; --accent-blue: #007aff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg-color); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; background: rgba(255,255,255,0.9);
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 景點簡介彈窗 (中置) */
        #detail-modal {
            border: none; border-radius: 20px; padding: 0; width: 85%; max-width: 450px;
            max-height: 60vh; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease-out;
        }
        #detail-modal::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        
        .modal-header { background: var(--primary-color); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; background: white; }
        .modal-close { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .nav-links { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: 1px solid #eee; border-radius: 10px; background: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-btn:disabled { opacity: 0.2; }

        /* 功能按鈕 */
        .action-links { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px;
            border: 1px solid #ddd; transition: 0.2s;
        }
        .btn-wiki { background: #f8f9fa; color: #333; }
        .btn-google { background: #e8f0fe; color: #1a73e8; border-color: #1a73e8; }
        
        .custom-pin img { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button style="padding: 10px 20px; border-radius: 20px; border: none; background: var(--primary-color); color: white; font-weight: bold;" onclick="exportData()">📤 匯出</button>
    <button style="padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent-blue); color: white; font-weight: bold;" onclick="document.getElementById('fileInput').click()">📥 匯入</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<dialog id="detail-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold;">景點快速導覽</span>
        <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
        <div class="nav-links">
            <button id="prev-btn" class="nav-btn"><span style="font-size:10px;color:#999">← 上一站</span><span id="prev-title" style="font-size:12px;font-weight:bold">---</span></button>
            <button id="next-btn" class="nav-btn"><span style="font-size:10px;color:#999">下一站 →</span><span id="next-title" style="font-size:12px;font-weight:bold">---</span></button>
        </div>
        <div id="modal-date" style="font-size: 13px; color: var(--primary-color); font-weight: bold; margin-bottom: 5px;"></div>
        <div id="modal-note" style="font-size: 15px; color: #444; line-height: 1.5; margin-bottom: 20px;"></div>

        <div class="action-links">
            <a href="javascript:void(0)" onclick="openSearchWindow('wiki')" class="btn-link btn-wiki">📖 開啟維基百科詳解</a>
            <a href="javascript:void(0)" onclick="openSearchWindow('google')" class="btn-link btn-google">🔍 Google 搜尋此地景點</a>
        </div>
    </div>
</dialog>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([39.7020, 141.1545], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allPoints = [
        { "date": "05/31", "lat": 38.2526, "lng": 140.8739, "title": "瑞鳳殿", "note": "🚗 下一站：仙台城跡 (約 10 min)。", "wikiUrl": "https://zh.m.wikipedia.org/wiki/瑞鳳殿" },
        { "date": "05/31", "lat": 38.2603, "lng": 140.8562, "title": "仙台城跡", "note": "🚗 明日首站：東澤玫瑰公園 (約 1 hr 10 min)。", "wikiUrl": "https://zh.m.wikipedia.org/wiki/仙台城" },
        { "date": "06/01", "lat": 38.4833, "lng": 140.3833, "title": "東澤玫瑰公園", "note": "🚗 下一站：中尊寺 (約 1 hr 30 min)。", "wikiUrl": "https://ja.m.wikipedia.org/wiki/東沢バラ公園" },
        { "date": "06/01", "lat": 38.9868, "lng": 141.1141, "title": "平泉中尊寺", "note": "🚗 明日首站：嚴美溪 (約 15 min)。", "wikiUrl": "https://zh.m.wikipedia.org/wiki/中尊寺" },
        { "date": "06/02", "lat": 38.9442, "lng": 141.0505, "title": "嚴美溪", "note": "🚗 下一站：盛岡手工藝村 (約 1 hr 10 min)。", "wikiUrl": "https://zh.m.wikipedia.org/wiki/嚴美溪" }
        // ... 其他點位保持不變 ...
    ];

    let markerList = [];
    let currentActiveMarker = null;
    let currentPoint = null;

    function getMarkerColor(date) {
        const uniqueDates = [...new Set(allPoints.map(p => p.date))].sort();
        const colorPalette = ['blue', 'red', 'orange', 'violet', 'green', 'gold', 'grey', 'black'];
        return colorPalette[uniqueDates.indexOf(date) % colorPalette.length];
    }

    function createIcon(color, isBig) {
        const s = isBig ? [40, 64] : [25, 41];
        return L.divIcon({
            className: 'custom-pin',
            html: `<img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png" style="width:${s[0]}px;height:${s[1]}px;">`,
            iconSize: s, iconAnchor: [s[0]/2, s[1]]
        });
    }

    // 開啟中尺寸視窗的功能
    function openSearchWindow(type) {
        if (!currentPoint) return;
        const url = type === 'wiki' ? currentPoint.wikiUrl : `https://www.google.com/search?q=${encodeURIComponent(currentPoint.title + ' 東北 景點')}`;
        
        const w = 600;
        const h = 800;
        const left = (screen.width / 2) - (w / 2);
        const top = (screen.height / 2) - (h / 2);
        
        // 使用 window.open 彈出中尺寸視窗
        window.open(url, 'TargetWindow', `toolbar=no, location=no, status=no, menubar=no, scrollbars=yes, resizable=yes, width=${w}, height=${h}, top=${top}, left=${left}`);
    }

    function openDetail(index) {
        currentPoint = allPoints[index];
        const targetMarker = markerList[index];

        map.panTo([currentPoint.lat, currentPoint.lng], { animate: true });
        setTimeout(() => map.panBy([0, -100]), 200);

        if (currentActiveMarker) {
            const prevIndex = markerList.indexOf(currentActiveMarker);
            currentActiveMarker.setIcon(createIcon(getMarkerColor(allPoints[prevIndex].date), false));
        }
        targetMarker.setIcon(createIcon(getMarkerColor(currentPoint.date), true));
        targetMarker.setZIndexOffset(1000);
        currentActiveMarker = targetMarker;

        document.getElementById('modal-title').innerText = currentPoint.title;
        document.getElementById('modal-date').innerText = `🗓️ ${currentPoint.date}`;
        document.getElementById('modal-note').innerText = currentPoint.note;

        const pb = document.getElementById('prev-btn'), nb = document.getElementById('next-btn');
        if (index > 0) {
            pb.disabled = false; document.getElementById('prev-title').innerText = allPoints[index-1].title;
            pb.onclick = () => openDetail(index - 1);
        } else { pb.disabled = true; document.getElementById('prev-title').innerText = "Start"; }
        
        if (index < allPoints.length - 1) {
            nb.disabled = false; document.getElementById('next-title').innerText = allPoints[index+1].title;
            nb.onclick = () => openDetail(index + 1);
        } else { nb.disabled = true; document.getElementById('next-title').innerText = "End"; }

        document.getElementById('detail-modal').showModal();
    }

    function closeModal() { document.getElementById('detail-modal').close(); }

    function renderAll() {
        markerList.forEach(m => map.removeLayer(m));
        markerList = [];
        allPoints.forEach((p, index) => {
            const m = L.marker([p.lat, p.lng], { icon: createIcon(getMarkerColor(p.date), false) }).on('click', () => openDetail(index));
            m.addTo(map);
            markerList.push(m);
        });
    }

    renderAll();
    // 匯入/匯出 function 保持原樣...
</script>
</body>
</html>
