<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>青島老城實景導覽地圖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background-color: #f8f9fa;
    }
    #map { flex: 2; height: 100%; }
    #sidebar {
      flex: 1;
      max-width: 400px;
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      background: white;
    }
    .place {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid transparent;
    }
    .place:hover {
      background-color: #f0f7ff;
      border-color: #cce5ff;
    }
    .place img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .place-info h3 {
      margin: 0 0 4px;
      font-size: 16px;
      color: #0056b3;
    }
    .place-info p {
      margin: 0;
      font-size: 13px;
      color: #666;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    h2 { color: #333; margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h2>青島景點實景導覽</h2>
    <p style="font-size: 13px; color: #888; margin-bottom: 20px;">點選下方景點或地圖標記查看實景。</p>
    <div id="place-list"></div>
  </div>

  <script>
    const places = [
      {
        id: "indigo",
        title: "青島英迪格酒店 Hotel Indigo",
        lat: 36.0665,
        lng: 120.3205,
        imageUrl: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600",
        description: "位於老城區核心，融合了青島里院文化與時尚設計的精品酒店。"
      },
      {
        id: "zhanqiao",
        title: "棧橋（回瀾閣）",
        lat: 36.0613,
        lng: 120.3200,
        imageUrl: "https://tse4.mm.bing.net/th/id/OIP.djmABa5uF4YmtevUnML2BQHaFY?pid=ImgDetMain",
        description: "青島百年的地標，回瀾閣在海浪簇擁下守護著這座海港城市。"
      },
      {
        id: "church",
        title: "青島天主教堂",
        lat: 36.0713,
        lng: 120.3208,
        imageUrl: "https://www.settour.com.tw/ss_img/poi/20200819/6ddf0848-3266-49c0-a80d-1075f489d3d4.jpg",
        description: "德式雙塔建築，是青島老城區最受歡迎的婚紗拍攝與觀光地標。"
      },
      {
        id: "zhongshan-road",
        title: "中山路老街",
        lat: 36.0700,
        lng: 120.3235,
        imageUrl: "https://www.news.cn/ci/20240821/69d02dd48a3c4ad590362e645da37368/2024082169d02dd48a3c4ad590362e645da37368_20240819806e536a813d4601b5d09a3259e08258.jpeg",
        description: "歷史悠久的商業老街，近年翻修後展現出復古與現代交織的新魅力。"
      },
      {
        id: "ship-dumpling",
        title: "船歌魚水餃",
        lat: 36.0690,
        lng: 120.3245,
        imageUrl: "https://icrvb3jy.xinmedia.com/solomo/article/E/5/D/E5D25FD2-42B0-9684-16F1-F90783611D50.jpeg",
        description: "鮮甜的海味包裹在Ｑ彈皮內，墨魚水餃是來青島必嚐的味蕾驚喜。"
      },
      {
        id: "liu-seafood",
        title: "劉氏海鮮燒烤",
        lat: 36.0730,
        lng: 120.3260,
        imageUrl: "https://followmii.tw/wp-content/uploads/2024/09/batch_PXL_20240919_103113614-1.jpg",
        description: "超澎湃的海鮮拼盤！炭火現烤出的鮮美滋味，搭配青島啤酒簡直是絕配。"
      },
      {
        id: "beer-house",
        title: "青島啤酒館",
        lat: 36.0745,
        lng: 120.3250,
        imageUrl: "https://qp-bowuguan-web.oss-cn-qingdao.aliyuncs.com/2025/3/28/1905511455555047425.png",
        description: "在這裡可以喝到最新鮮的原漿啤酒，深入體會這座城市的微醺日常。"
      },
      {
        id: "cafe-1907",
        title: "1907 咖啡館",
        lat: 36.0645,
        lng: 120.3220,
        imageUrl: "https://ak-d.tripcdn.com/images/1mi0d224x98oyzgfvC519.jpg",
        description: "在百年古蹟「德國水兵俱樂部」中品嚐咖啡，時光在此緩緩流轉。"
      },
      {
        id: "german-bakery",
        title: "德國麵包房 German Bakery",
        lat: 36.0680,
        lng: 120.3215,
        imageUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdgiT-sBtkDS8sSWe89xBbzRN5kTTljwHLC0HvzXryFMRGY_mKwq2O7NY&s=10",
        description: "紮實厚重的德式風味，麥香十足，是老城區裡飄散百年的異國香氣。"
      }
    ];

    let map, infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.0675, lng: 120.3220 },
        zoom: 15
      });
      infoWindow = new google.maps.InfoWindow();
      renderMarkers();
      renderSidebar();
    }

    function renderMarkers() {
      places.forEach(place => {
        const marker = new google.maps.Marker({
          position: { lat: place.lat, lng: place.lng },
          map,
          title: place.title
        });
        marker.addListener("click", () => openInfoWindow(place, marker));
        place._marker = marker;
      });
    }

    function openInfoWindow(place, marker) {
      const content = `
        <div style="max-width:240px; padding:5px;">
          <h3 style="margin:0 0 8px; font-size:16px;">${place.title}</h3>
          <img src="${place.imageUrl}" referrerpolicy="no-referrer" style="width:100%; height:140px; object-fit:cover; border-radius:6px; margin-bottom:8px;" />
          <p style="margin:0; font-size:13px; color:#555; line-height:1.4;">${place.description}</p>
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);
      map.panTo(marker.getPosition());
    }

    function renderSidebar() {
      const listEl = document.getElementById("place-list");
      places.forEach(place => {
        const item = document.createElement("div");
        item.className = "place";
        item.innerHTML = `
          <img src="${place.imageUrl}" referrerpolicy="no-referrer">
          <div class="place-info">
            <h3>${place.title}</h3>
            <p>${place.description}</p>
          </div>
        `;
        item.addEventListener("click", () => openInfoWindow(place, place._marker));
        listEl.appendChild(item);
      });
    }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
</body>
</html>
